<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kidda Analytics OS</title>

<style>
/* (keeping your styles unchanged for brevity) */
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:system-ui,-apple-system,sans-serif;background:#f8f8f7;color:#1a1a1a;}
</style>
</head>

<body>
<div class="os">

<!-- 🔴 TOPBAR FIXED -->
<div class="topbar">
  <span class="topbar-title">Kidda OS</span>

  <!-- ✅ FIXED ID -->
  <span id="unread-alert" class="alert-red alert-pill">🔴 1 unread messages</span>

  <span class="alert-amber alert-pill">⚠ Bookings 14/50 — 28% of target</span>
  <span class="alert-green alert-pill">✓ 6 leads · CPL £12.22 · CPC £0.37</span>
  <span class="alert-green alert-pill">✓ Stripe live · £649 this week</span>

  <button class="refresh-btn" onclick="loadData()">↻ Refresh</button>
</div>

<!-- ACQUISITION METRICS (ONLY showing relevant ones updated) -->
<div class="metric-grid">

  <!-- ✅ BOOKINGS -->
  <div class="metric-card">
    <div class="metric-label">Meetings booked</div>
    <div id="bookings-value" class="metric-value">14</div>
  </div>

  <!-- ✅ REVENUE -->
  <div class="metric-card">
    <div class="metric-label">This week</div>
    <div id="revenue-value" class="metric-value">£649</div>
  </div>

</div>

</div>


<script>
async function loadData() {
  try {
    const res = await fetch('https://kidda-os-backend.vercel.app/api/dashboard');
    const data = await res.json();

    console.log('Backend data:', data);

    document.getElementById('bookings-value').textContent = data.bookings;
    document.getElementById('revenue-value').textContent = '£' + data.revenue;
    document.getElementById('unread-alert').textContent = `🔴 ${data.unread} unread messages`;

  } catch (err) {
    console.error('Error loading data:', err);
  }
}

loadData();
</script>

</body>
</html>

</body>
</html>
