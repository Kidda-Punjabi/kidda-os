<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kidda Analytics OS</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:system-ui,-apple-system,sans-serif;background:#f8f8f7;color:#1a1a1a;}

.os{padding:20px;}

.topbar{
  display:flex;
  align-items:center;
  gap:8px;
  padding:12px 16px;
  border-bottom:1px solid #ddd;
  background:#fff;
}

.topbar-title{
  font-size:14px;
  font-weight:600;
}

.alert-pill{
  font-size:12px;
  padding:4px 10px;
  border-radius:20px;
}

.alert-red{background:#fee2e2;color:#991b1b;}
.alert-amber{background:#fef3c7;color:#92400e;}
.alert-green{background:#dcfce7;color:#166534;}

.refresh-btn{
  margin-left:auto;
  padding:6px 12px;
  border-radius:6px;
  border:1px solid #ccc;
  cursor:pointer;
}

.metric-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:12px;
  margin-top:20px;
}

.metric-card{
  background:#f0efeb;
  padding:14px;
  border-radius:8px;
}

.metric-label{
  font-size:12px;
  color:#666;
}

.metric-value{
  font-size:22px;
  font-weight:600;
}
</style>
</head>

<body>

<div class="os">

  <!-- TOPBAR -->
  <div class="topbar">
    <span class="topbar-title">Kidda OS</span>

    <span id="unread-alert" class="alert-pill alert-red">
      🔴 1 unread messages
    </span>

    <span class="alert-pill alert-amber">
      ⚠ Bookings <span id="bookings-inline">14</span>/50
    </span>

    <span class="alert-pill alert-green">
      ✓ Revenue £<span id="revenue-inline">649</span>
    </span>

    <button class="refresh-btn" onclick="loadData()">↻ Refresh</button>
  </div>

  <!-- METRICS -->
  <div class="metric-grid">

    <div class="metric-card">
      <div class="metric-label">Meetings booked</div>
      <div id="bookings-value" class="metric-value">14</div>
    </div>

    <div class="metric-card">
      <div class="metric-label">Revenue (this week)</div>
      <div id="revenue-value" class="metric-value">£649</div>
    </div>

    <div class="metric-card">
      <div class="metric-label">Unread messages</div>
      <div id="unread-value" class="metric-value">1</div>
    </div>

  </div>

</div>

<script>
async function loadData() {
  try {
    const res = await fetch('https://kidda-os-backend.vercel.app/api/dashboard');
    const data = await res.json();

    console.log('Backend data:', data);

    // BOOKINGS
    const bookingsMain = document.getElementById('bookings-value');
    const bookingsInline = document.getElementById('bookings-inline');
    if (bookingsMain) bookingsMain.textContent = data.bookings;
    if (bookingsInline) bookingsInline.textContent = data.bookings;

    // REVENUE
    const revenueMain = document.getElementById('revenue-value');
    const revenueInline = document.getElementById('revenue-inline');
    if (revenueMain) revenueMain.textContent = '£' + data.revenue;
    if (revenueInline) revenueInline.textContent = data.revenue;

    // UNREAD
    const unreadMain = document.getElementById('unread-value');
    const unreadAlert = document.getElementById('unread-alert');

    if (unreadMain) unreadMain.textContent = data.unread;
    if (unreadAlert) {
      unreadAlert.textContent = `🔴 ${data.unread} unread messages`;
    }

  } catch (err) {
    console.error('Error loading data:', err);
  }
}

// Run immediately
loadData();

// Auto refresh every 30s
setInterval(loadData, 30000);
</script>

</body>
</html>
