<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kidda Analytics OS</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:system-ui,-apple-system,sans-serif;background:#f8f8f7;color:#1a1a1a;}

.os{display:flex;flex-direction:column;min-height:100vh;}

.topbar{
  display:flex;align-items:center;gap:8px;
  padding:12px 16px;
  border-bottom:1px solid rgba(0,0,0,0.1);
  background:#fff;
  flex-wrap:wrap;
}

.topbar-title{font-size:13px;font-weight:600;}

.alert-pill{
  font-size:11px;
  padding:4px 10px;
  border-radius:20px;
}

.alert-red{background:#fee2e2;color:#991b1b;}
.alert-amber{background:#fef3c7;color:#92400e;}
.alert-green{background:#dcfce7;color:#166534;}

.refresh-btn{
  margin-left:auto;
  padding:5px 12px;
  border-radius:6px;
  border:1px solid #ccc;
  cursor:pointer;
}

.tabs{
  display:flex;
  border-bottom:1px solid #ddd;
  background:#fff;
}

.tab{
  padding:10px 16px;
  font-size:13px;
  border:none;
  background:none;
  cursor:pointer;
}

.tab.active{
  border-bottom:2px solid black;
  font-weight:600;
}

.panel{
  display:none;
  padding:16px;
}

.panel.active{
  display:block;
}

.metric-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
  gap:10px;
}

.metric-card{
  background:#f0efeb;
  padding:12px;
  border-radius:8px;
}

.metric-label{
  font-size:11px;
  color:#666;
}

.metric-value{
  font-size:22px;
  font-weight:600;
}
</style>
</head>

<body>

<div class="os">

<!-- TOPBAR -->
<div class="topbar">
  <span class="topbar-title">Kidda OS</span>

  <span id="unread-alert" class="alert-pill alert-red">
    🔴 1 unread messages
  </span>

  <span class="alert-pill alert-amber">
    ⚠ Bookings <span id="bookings-inline">14</span>/50
  </span>

  <span class="alert-pill alert-green">
    ✓ Revenue £<span id="revenue-inline">649</span>
  </span>

  <button class="refresh-btn" onclick="loadData()">↻ Refresh</button>
</div>

<!-- TABS -->
<div class="tabs">
  <button class="tab active" onclick="switchTab('acquisition',this)">Acquisition</button>
  <button class="tab" onclick="switchTab('operations',this)">Operations</button>
  <button class="tab" onclick="switchTab('delivery',this)">Delivery</button>
</div>

<!-- ACQUISITION -->
<div id="panel-acquisition" class="panel active">

  <div class="metric-grid">

    <div class="metric-card">
      <div class="metric-label">Bookings</div>
      <div id="bookings-value" class="metric-value">14</div>
    </div>

    <div class="metric-card">
      <div class="metric-label">Revenue</div>
      <div id="revenue-value" class="metric-value">£649</div>
    </div>

    <div class="metric-card">
      <div class="metric-label">Unread</div>
      <div id="unread-value" class="metric-value">1</div>
    </div>

  </div>

</div>

<!-- OPERATIONS -->
<div id="panel-operations" class="panel">
  <div class="metric-grid">

    <div class="metric-card">
      <div class="metric-label">Unread Messages</div>
      <div id="ops-unread" class="metric-value">1</div>
    </div>

    <div class="metric-card">
      <div class="metric-label">Bookings</div>
      <div id="ops-bookings" class="metric-value">14</div>
    </div>

  </div>
</div>

<!-- DELIVERY -->
<div id="panel-delivery" class="panel">
  <div class="metric-grid">

    <div class="metric-card">
      <div class="metric-label">Revenue</div>
      <div id="del-revenue" class="metric-value">£649</div>
    </div>

  </div>
</div>

</div>

<script>

// TAB SWITCH
function switchTab(id, el){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('panel-'+id).classList.add('active');
  el.classList.add('active');
}

// DATA LOADER
async function loadData() {
  try {
    const res = await fetch('https://kidda-os-backend.vercel.app/api/dashboard');
    const data = await res.json();

    console.log('Backend data:', data);

    // BOOKINGS
    setText('bookings-value', data.bookings);
    setText('bookings-inline', data.bookings);
    setText('ops-bookings', data.bookings);

    // REVENUE
    setText('revenue-value', '£' + data.revenue);
    setText('revenue-inline', data.revenue);
    setText('del-revenue', '£' + data.revenue);

    // UNREAD
    setText('unread-value', data.unread);
    setText('ops-unread', data.unread);

    const alert = document.getElementById('unread-alert');
    if(alert){
      alert.textContent = `🔴 ${data.unread} unread messages`;
    }

  } catch(err){
    console.error('Error:', err);
  }
}

// SAFE SETTER
function setText(id, value){
  const el = document.getElementById(id);
  if(el) el.textContent = value;
}

// INIT
loadData();
setInterval(loadData, 30000);

</script>

</body>
</html>
